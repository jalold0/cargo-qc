name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Bir vaqtning o'zida bitta workflow yurish — eski runlar to'xtatiladi
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Print versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        # `npm ci` lock fayl bilan sinxron bo'lishni talab qiladi.
        # CI'da to'g'ridan-to'g'ri `npm install` ishlatamiz — bu turli npm/Node
        # versiyalari o'rtasidagi lockfile mismatch'larga chidamli.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
